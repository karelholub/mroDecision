apiVersion: v1
kind: Service
metadata:
  name: dee
  labels:
    app.kubernetes.io/name: meiro-dee
spec:
  ports:
    - name: http
      port: 80
      targetPort: http
  selector:
    app.kubernetes.io/name: meiro-dee
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dee
  labels:
    app.kubernetes.io/name: meiro-dee
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: meiro-dee
  template:
    metadata:
      labels:
        app.kubernetes.io/name: meiro-dee
    spec:
      terminationGracePeriodSeconds: 30
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: meiro-dee
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: meiro-dee
      containers:
        - name: dee
          image: meiro-decision-engine:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          envFrom:
            - configMapRef:
                name: dee-config
            - secretRef:
                name: dee-secrets
          readinessProbe:
            httpGet:
              path: /v1/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /v1/ready
              port: http
            periodSeconds: 5
            failureThreshold: 24
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dee
  labels:
    app.kubernetes.io/name: meiro-dee
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dee
  minReplicas: 3
  maxReplicas: 12
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 4
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: dee
  labels:
    app.kubernetes.io/name: meiro-dee
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: meiro-dee
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dee
  labels:
    app.kubernetes.io/name: meiro-dee
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "8m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "20"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "20"
spec:
  rules:
    - host: dee.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dee
                port:
                  name: http
