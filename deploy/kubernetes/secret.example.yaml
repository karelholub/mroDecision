apiVersion: v1
kind: Secret
metadata:
  name: dee-secrets
  labels:
    app.kubernetes.io/name: meiro-dee
type: Opaque
stringData:
  # Replace before applying or manage through External Secrets / Sealed Secrets.
  DEE_DATABASE_URL: postgres://dee:change-me@dee-postgres:5432/dee
  # Bootstrap token should be temporary. Create a DB-backed admin token, then keep
  # DEE_BOOTSTRAP_TOKENS_ENABLED=false in the ConfigMap.
  DEE_TOKENS: '[{"name":"bootstrap-admin","token":"replace-me","scopes":["admin","evaluate","client"],"decision_keys":[]}]'
