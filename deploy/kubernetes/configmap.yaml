apiVersion: v1
kind: ConfigMap
metadata:
  name: dee-config
  labels:
    app.kubernetes.io/name: meiro-dee
data:
  NODE_ENV: production
  PORT: "8080"
  DEE_STORE_ADAPTER: postgres_native
  DEE_POSTGRES_POOL_MAX: "10"
  DEE_POSTGRES_IDLE_TIMEOUT_MS: "30000"
  DEE_POSTGRES_CONNECTION_TIMEOUT_MS: "5000"
  DEE_POSTGRES_STATEMENT_TIMEOUT_MS: "15000"
  DEE_AUDIT_RETENTION_DAYS: "90"
  DEE_CLIENT_EVENT_RETENTION_DAYS: "180"
  DEE_BOOTSTRAP_TOKENS_ENABLED: "false"
  DEE_RUNTIME_STATE_ADAPTER: "postgres"
  DEE_REQUEST_BODY_LIMIT_BYTES: "1048576"
  DEE_BATCH_REQUEST_BODY_LIMIT_BYTES: "8388608"
  DEE_REQUEST_TIMEOUT_MS: "15000"
  DEE_HEADERS_TIMEOUT_MS: "16000"
  DEE_KEEP_ALIVE_TIMEOUT_MS: "5000"
  DEE_MAX_REQUESTS_PER_SOCKET: "1000"
  DEE_SHUTDOWN_GRACE_MS: "25000"
  DEE_CLIENT_RATE_LIMIT_WINDOW_MS: "60000"
  DEE_CLIENT_RATE_LIMIT_MAX: "600"
  DEE_LOAD_SHEDDING_MODE: "monitor"
  DEE_LOAD_SHEDDING_MIN_SAMPLES: "100"
  DEE_LOAD_SHEDDING_RUNTIME_P95_MS: "1000"
  DEE_LOAD_SHEDDING_CLIENT_ERROR_RATE: "0.2"
  DEE_LOAD_SHEDDING_PROFILE_ERROR_THRESHOLD: "20"
  DEE_LOAD_SHEDDING_RETRY_AFTER_SECONDS: "10"
  DEE_LOAD_SHEDDING_SHED_ON_OPEN_CIRCUIT: "false"
  DEE_MEIRO_CIRCUIT_FAILURE_THRESHOLD: "5"
  DEE_MEIRO_CIRCUIT_COOLDOWN_MS: "30000"
  DEE_CORS_ORIGINS: "https://www.example.com,https://app.example.com"
