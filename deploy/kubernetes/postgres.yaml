apiVersion: v1
kind: Service
metadata:
  name: dee-postgres
  labels:
    app.kubernetes.io/name: dee-postgres
spec:
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
  selector:
    app.kubernetes.io/name: dee-postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dee-postgres
  labels:
    app.kubernetes.io/name: dee-postgres
spec:
  serviceName: dee-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dee-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dee-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: dee
            - name: POSTGRES_USER
              value: dee
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dee-postgres-secret
                  key: POSTGRES_PASSWORD
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "dee", "-d", "dee"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "dee", "-d", "dee"]
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: dee-postgres-secret
  labels:
    app.kubernetes.io/name: dee-postgres
type: Opaque
stringData:
  POSTGRES_PASSWORD: change-me
