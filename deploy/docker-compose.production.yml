services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dee}
      POSTGRES_USER: ${POSTGRES_USER:-dee}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - dee-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-dee} -d $${POSTGRES_DB:-dee}"]
      interval: 10s
      timeout: 5s
      retries: 5

  dee:
    image: ${DEE_IMAGE:-meiro-decision-engine:latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${DEE_PORT:-8080}
      DEE_STORE_ADAPTER: ${DEE_STORE_ADAPTER:-postgres_native}
      DEE_DATABASE_URL: ${DEE_DATABASE_URL:-postgres://dee:change-me@postgres:5432/dee}
      DEE_POSTGRES_POOL_MAX: ${DEE_POSTGRES_POOL_MAX:-10}
      DEE_POSTGRES_IDLE_TIMEOUT_MS: ${DEE_POSTGRES_IDLE_TIMEOUT_MS:-30000}
      DEE_POSTGRES_CONNECTION_TIMEOUT_MS: ${DEE_POSTGRES_CONNECTION_TIMEOUT_MS:-5000}
      DEE_POSTGRES_STATEMENT_TIMEOUT_MS: ${DEE_POSTGRES_STATEMENT_TIMEOUT_MS:-15000}
      DEE_DATA_DIR: ${DEE_DATA_DIR:-/app/data}
      DEE_DB_PATH: ${DEE_DB_PATH:-/app/data/dee.sqlite}
      DEE_AUDIT_RETENTION_DAYS: ${DEE_AUDIT_RETENTION_DAYS:-90}
      DEE_CLIENT_EVENT_RETENTION_DAYS: ${DEE_CLIENT_EVENT_RETENTION_DAYS:-180}
      DEE_BOOTSTRAP_TOKENS_ENABLED: ${DEE_BOOTSTRAP_TOKENS_ENABLED:-false}
      DEE_TOKENS: ${DEE_TOKENS:-[]}
      DEE_RUNTIME_STATE_ADAPTER: ${DEE_RUNTIME_STATE_ADAPTER:-memory}
      DEE_REQUEST_BODY_LIMIT_BYTES: ${DEE_REQUEST_BODY_LIMIT_BYTES:-1048576}
      DEE_BATCH_REQUEST_BODY_LIMIT_BYTES: ${DEE_BATCH_REQUEST_BODY_LIMIT_BYTES:-8388608}
      DEE_REQUEST_TIMEOUT_MS: ${DEE_REQUEST_TIMEOUT_MS:-15000}
      DEE_HEADERS_TIMEOUT_MS: ${DEE_HEADERS_TIMEOUT_MS:-16000}
      DEE_KEEP_ALIVE_TIMEOUT_MS: ${DEE_KEEP_ALIVE_TIMEOUT_MS:-5000}
      DEE_MAX_REQUESTS_PER_SOCKET: ${DEE_MAX_REQUESTS_PER_SOCKET:-1000}
      DEE_SHUTDOWN_GRACE_MS: ${DEE_SHUTDOWN_GRACE_MS:-25000}
      DEE_CLIENT_RATE_LIMIT_WINDOW_MS: ${DEE_CLIENT_RATE_LIMIT_WINDOW_MS:-60000}
      DEE_CLIENT_RATE_LIMIT_MAX: ${DEE_CLIENT_RATE_LIMIT_MAX:-600}
      DEE_LOAD_SHEDDING_MODE: ${DEE_LOAD_SHEDDING_MODE:-monitor}
      DEE_LOAD_SHEDDING_MIN_SAMPLES: ${DEE_LOAD_SHEDDING_MIN_SAMPLES:-100}
      DEE_LOAD_SHEDDING_RUNTIME_P95_MS: ${DEE_LOAD_SHEDDING_RUNTIME_P95_MS:-1000}
      DEE_LOAD_SHEDDING_CLIENT_ERROR_RATE: ${DEE_LOAD_SHEDDING_CLIENT_ERROR_RATE:-0.2}
      DEE_LOAD_SHEDDING_PROFILE_ERROR_THRESHOLD: ${DEE_LOAD_SHEDDING_PROFILE_ERROR_THRESHOLD:-20}
      DEE_LOAD_SHEDDING_RETRY_AFTER_SECONDS: ${DEE_LOAD_SHEDDING_RETRY_AFTER_SECONDS:-10}
      DEE_LOAD_SHEDDING_SHED_ON_OPEN_CIRCUIT: ${DEE_LOAD_SHEDDING_SHED_ON_OPEN_CIRCUIT:-false}
      DEE_MEIRO_CIRCUIT_FAILURE_THRESHOLD: ${DEE_MEIRO_CIRCUIT_FAILURE_THRESHOLD:-5}
      DEE_MEIRO_CIRCUIT_COOLDOWN_MS: ${DEE_MEIRO_CIRCUIT_COOLDOWN_MS:-30000}
      DEE_CORS_ORIGINS: ${DEE_CORS_ORIGINS:-}
    volumes:
      - dee-data:${DEE_DATA_DIR:-/app/data}
    expose:
      - "${DEE_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:' + (process.env.PORT || 8080) + '/v1/ready').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      dee:
        condition: service_healthy
    ports:
      - "80:80"
    environment:
      DEE_PUBLIC_HOST: ${DEE_PUBLIC_HOST:-localhost}
      DEE_PORT: ${DEE_PORT:-8080}
    volumes:
      - ./nginx.conf:/etc/nginx/templates/default.conf.template:ro

volumes:
  dee-data:
  dee-postgres:
