          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
  /v1/schema:
    get:
      summary: List cached Meiro schema items
      parameters:
        - name: kind
          in: query
          schema:
            type: string
            enum: [attribute, segment, context]
      responses:
        "200":
          description: Cached schema items
          content:
            application/json:
              schema:
                type: object
                properties:
                  schema:
                    type: array
                    items:
                      $ref: "#/components/schemas/SchemaItem"
  /v1/schema/import:
    post:
      summary: Manually import Meiro schema items
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SchemaImport"
      responses:
        "200":
          description: Imported schema items by kind
          content:
            application/json:
              schema:
                type: object
                properties:
                  imported:
                    type: object
                  diagnostics:
                    $ref: "#/components/schemas/SchemaImportDiagnostics"
  /v1/meiro-deliveries:
    get:
      summary: List recent Meiro webhook and feedback delivery attempts
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: target
          in: query
          schema:
            type: string
            enum: [profile, collector, feedback]
        - name: ok
          in: query
          schema:
            type: boolean
        - name: status
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Recent Meiro delivery attempts
          content:
            application/json:
              schema:
                type: object
                properties:
                  deliveries:
                    type: array
                    items:
                      $ref: "#/components/schemas/MeiroDelivery"
                  summary:
                    $ref: "#/components/schemas/MeiroDeliverySummary"
  /v1/schema/sync:
    post:
      summary: Sync schema by sampling a Meiro profile
      description: Calls the configured Meiro Profile API endpoint with an identifier and infers attribute, segment, and context schema from the returned profile payload.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [identifier_type, identifier_value]
              properties:
                identifier_type:
                  type: string
                identifier_value:
                  type: string
                meiro_api_url:
                  type: string
                meiro_api_token:
                  type: string
      responses:
        "200":
          description: Imported schema items inferred from a profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  source:
                    type: string
                  imported:
                    type: object
                  profile_shape:
                    type: array
                    items:
                      type: string
  /v1/meiro/metadata/sync:
    post:
      summary: Sync Meiro metadata for rule authoring
      description: Uses the Meiro skill/mpcli shared API contract when a separate mpcli/shared API token is configured, with Profile API sampling as a fallback for condition-builder schema suggestions.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                meiro_skill_url:
                  type: string
                meiro_cli_url:
                  type: string
                meiro_cli_token:
                  type: string
                  description: Separate Meiro CLI/shared API token, not the Profile API token.
                meiro_api_url:
                  type: string
                meiro_api_token:
                  type: string
                  description: Profile API token used only for profile sampling fallback.
                identifier_type:
                  type: string
                identifier_value:
                  type: string
      responses:
        "200":
          description: Imported authoring metadata and diagnostics
          content:
            application/json:
              schema:
                type: object
                properties:
                  imported:
                    type: object
                  metadata:
                    type: object
                  diagnostics:
                    type: object
  /v1/export:
    get:
      summary: Export rule sets and lookup tables as a promotion bundle
      parameters:
        - name: include_audit
          in: query
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Configuration bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigBundle"
  /v1/import:
    post:
      summary: Import a promotion bundle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigBundle"
      responses:
        "200":
          description: Import summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  imported:
                    type: object
                    properties:
                      rule_sets:
                        type: integer
                      lookup_tables:
                        type: integer
  /v1/tokens:
    get:
      summary: List API tokens
      responses:
        "200":
          description: API tokens without plaintext secret values
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens:
                    type: array
                    items:
                      $ref: "#/components/schemas/ApiToken"
    post:
      summary: Create an API token
      description: The plaintext token is returned once and is never shown again.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                scopes:
                  type: array
                  items:
                    type: string
                    enum: [viewer, editor, publisher, admin, evaluate, client]
                decision_keys:
                  type: array
                  description: Optional allow-list of decision keys for client tokens. Empty means all decisions.
                  items:
                    type: string
      responses:
        "201":
          description: Created token with one-time plaintext value
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    allOf:
                      - $ref: "#/components/schemas/ApiToken"
                      - type: object
                        properties:
                          token:
                            type: string
  /v1/tokens/{id}:
    delete:
      summary: Revoke an API token
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Revoked token metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    $ref: "#/components/schemas/ApiToken"
  /v1/settings:
    get:
      summary: Get operational settings
      responses:
        "200":
          description: Settings and runtime metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  settings:
                    $ref: "#/components/schemas/Settings"
                  runtime:
                    type: object
                    properties:
                      schema_sync:
                        $ref: "#/components/schemas/SchemaSyncRuntime"
    put:
      summary: Update operational settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Settings"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  settings:
                    $ref: "#/components/schemas/Settings"
                  runtime:
                    type: object
                    properties:
                      schema_sync:
                        $ref: "#/components/schemas/SchemaSyncRuntime"
  /v1/settings/test-connection:
    post:
      summary: Test configured Meiro Profile API, collector, or feedback connectivity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target]
              properties:
                target:
                  type: string
                  enum: [profile, collector, feedback]
                meiro_url:
                  type: string
                meiro_source_slug:
                  type: string
                meiro_api_url:
                  type: string
                meiro_api_token:
                  type: string
                meiro_feedback_url:
                  type: string
                meiro_skill_url:
                  type: string
                meiro_cli_url:
                  type: string
                meiro_cli_token:
                  type: string
                identifier_type:
                  type: string
                identifier_value:
                  type: string
      responses:
        "200":
          description: Connectivity test result
          content:
            application/json:
              schema:
                type: object
                properties:
                  target:
                    type: string
                  ok:
                    type: boolean
                  status:
                    type: integer
                  endpoint:
                    type: string
                  message:
                    type: string
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    RuleSetKey:
      name: key
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-z0-9_]+$"
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: Optional retry key for client event ingestion. Used as event_id when the JSON body omits event_id.
      schema:
        type: string
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    Error:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string
    AssistantPlanRequest:
      type: object
      required: [prompt]
      properties:
        prompt:
          type: string
        type:
          type: string
          enum: [decision, inapp_message, experiment]
        decision_key:
          type: string
        surface:
          type: string
        ttl_seconds:
          type: integer
        variants:
          type: array
          items:
            type: object
            additionalProperties: true
        conditions:
          type: array
          items:
            type: object
            additionalProperties: true
    AssistantPlan:
      type: object
      required: [mode, summary, guardrails, actions]
      properties:
        mode:
          type: string
          enum: [draft_only, advice]
        prompt:
          type: string
        summary:
          type: string
        clarifications:
          type: array
          description: Non-blocking assumptions and questions that should be reviewed before publishing.
          items:
            type: object
            properties:
              id:
                type: string
              topic:
                type: string
              question:
                type: string
              assumed:
                type: string
              options:
                type: array
                items:
                  type: string
              priority:
                type: string
                enum: [low, medium, high]
              blocking:
                type: boolean
        schema:
          type: object
          properties:
            available:
              type: integer
            matched_fields:
              type: array
              items:
                type: object
                additionalProperties: true
            missing_fields:
              type: array
              items:
                type: object
                additionalProperties: true
            suggestions:
              type: array
              items:
                type: object
                additionalProperties: true
        preview:
          type: object
          properties:
            sample_request:
              $ref: "#/components/schemas/EvaluateRequest"
            draft_evaluation:
              $ref: "#/components/schemas/EvaluateResponse"
        guardrails:
          type: object
          properties:
            status:
              type: string
              enum: [ok, review, blocked]
            errors:
              type: array
              items:
                type: string
            warnings:
              type: array
              items:
                type: string
        provider:
          type: object
          additionalProperties: true
        governance:
          type: object
          properties:
            status:
              type: string
              enum: [pass, review, block]
            risk_level:
              type: string
              enum: [low, medium, high]
            contract:
              type: string
              enum: [draft_only, advice_only]
            provider_mode:
              type: string
            provider_status:
              type: string
            provider_policy:
              type: string
              enum: [conservative, balanced, creative]
            contract_version:
              type: string
            action_count:
              type: integer
            unsupported_action_count:
              type: integer
            secret_finding_count:
              type: integer
            summary:
              type: string
            checks:
              type: array
              items:
                type: object
                additionalProperties: true
        actions:
          type: array
          items:
            type: object
            required: [action, id, object]
            properties:
              action:
                type: string
                enum: [upsert_message, create_rule_draft, update_rule_draft]
              id:
                type: string
              object:
                type: object
                additionalProperties: true
    Readiness:
      type: object
      properties:
        status:
          type: string
          enum: [ready, not_ready]
        service:
          type: string
        now:
          type: string
          format: date-time
        database:
          $ref: "#/components/schemas/DatabaseReadiness"
    DatabaseReadiness:
      type: object
      properties:
        ok:
          type: boolean
        adapter:
          type: string
        adapter_info:
          $ref: "#/components/schemas/StoreAdapterInfo"
        deployment:
          $ref: "#/components/schemas/StoreDeploymentReadiness"
        path:
          type: string
        error:
          type: string
    StoreAdapterInfo:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        production_notes:
          type: string
        capabilities:
          type: object
    StoreDeploymentReadiness:
      type: object
      properties:
        status:
          type: string
          enum: [production_ready, single_instance, not_ready]
        summary:
          type: string
        recommended_max_replicas:
          type: integer
          nullable: true
        backup_mode:
          type: string
        checks:
          type: array
          items:
            $ref: "#/components/schemas/StoreDeploymentCheck"
    StoreDeploymentCheck:
      type: object
      properties:
        key:
          type: string
        ok:
          type: boolean
        level:
          type: string
          enum: [ok, warn, error]
        label:
          type: string
        detail:
          type: string
    Identifier:
      type: object
      required: [typeId, value]
      properties:
        typeId:
          type: string
        value:
          type: string
    AttributeValue:
      type: object
      required: [value]
      properties:
        value: {}
    EvaluateRequest:
      allOf:
        - type: object
          required: [decision_key]
          properties:
            decision_key:
              type: string
            rule_version:
              type: integer
              nullable: true
        - $ref: "#/components/schemas/EvaluateRequestProfile"
    EvaluateRequestProfile:
      type: object
      required: [profile_key, identifiers]
      properties:
        profile_key:
          type: string
        identifiers:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/Identifier"
        attributes:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: "#/components/schemas/AttributeValue"
        segments:
          type: object
          additionalProperties:
            type: boolean
        context:
          type: object
          description: Optional request context. Experiments support force_variant for QA and force_holdout or forced_holdouts[decision_key] for no-variant holdout overrides.
          additionalProperties: true
        event:
          type: object
          description: Optional conversion details such as name, value, currency, or order id.
          additionalProperties: true
    EvaluateResponse:
      type: object
      required: [decision_key, profile_key, evaluated_at, rule_version, result, outputs, matched_rules, errors]
      properties:
        decision_key:
          type: string
        profile_key:
          type: string
        evaluated_at:
          type: string
          format: date-time
        rule_version:
          type: integer
        result:
          type: string
          example: eligible
        outputs:
          type: object
          description: Decision outputs. When a message is attached, outputs.message includes content plus availability metadata; unavailable messages return a suppression_reason.
          additionalProperties: true
        matched_rules:
          type: array
          items:
            type: string
        trace:
          type: array
          description: Ordered evaluation trace. Graph decisions include node-level path details; branch decisions include branch checks.
          items:
            type: object
            additionalProperties: true
        errors:
          type: array
          items:
            type: string
    ClientEvaluateRequest:
      type: object
      required: [decision_key, profile_key]
      properties:
        decision_key:
          type: string
        profile_key:
          type: string
        identifiers:
          type: array
          items:
            $ref: "#/components/schemas/Identifier"
        attributes:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: "#/components/schemas/AttributeValue"
        segments:
          type: object
          additionalProperties:
            type: boolean
        context:
          type: object
          description: Request context supplied by the website or app. Normal context such as channel, surface, page, or session does not suppress Meiro Profile API enrichment. Set profile_enrichment/enrich_profile to "always" or true to force enrichment, or "off" or false to disable it.
          additionalProperties: true
    ClientEvaluateResponse:
      type: object
      required: [decision_key, profile_key, result, outputs, rule_version, ttl_seconds, matched_rules, errors]
      properties:
        decision_key:
          type: string
        profile_key:
          type: string
        result:
          type: string
        outputs:
          type: object
          additionalProperties: true
        rule_version:
          type: integer
        ttl_seconds:
          type: integer
          description: Client-side cache TTL hint from the rule-set cache policy.
        cache_scope:
          type: string
          nullable: true
        cache:
          type: object
          properties:
            hit:
              type: boolean
            scope:
              type: string
              nullable: true
            expires_at:
              type: string
              format: date-time
              nullable: true
        profile_cache:
          type: object
          description: Meiro Profile API enrichment/cache status for sparse client requests.
          properties:
            status:
              type: string
              enum: [disabled, local_payload, not_configured, hit, miss, error]
            hit:
              type: boolean
            ttl_seconds:
              type: integer
            expires_at:
              type: string
              format: date-time
              nullable: true
            reason:
              type: string
            strategy:
              type: string
              enum: [fixed, bandit]
            bandit:
              type: object
              nullable: true
              description: Adaptive assignment diagnostics when an experiment uses bandit mode.
            error:
              type: string
            diagnostics:
              type: object
              description: Human-readable enrichment diagnostics showing source, missing fields, profile cache freshness, and schema drift for this evaluation.
              properties:
                source:
                  type: string
                enriched:
                  type: boolean
                identifier_type:
                  type: string
                fields_added:
                  type: object
                  properties:
                    attributes:
                      type: array
                      items:
                        type: string
                    segments:
                      type: array
                      items:
                        type: string
                    context:
                      type: array
                      items:
                        type: string
                fields_sent_locally:
                  type: object
                  properties:
                    attributes:
                      type: array
                      items:
                        type: string
                    segments:
                      type: array
                      items:
                        type: string
                    context:
                      type: array
                      items:
                        type: string
                hydrated_field_counts:
                  type: object
