            type: string
      responses:
        "200":
          description: Saved evaluation profiles
          content:
            application/json:
              schema:
                type: object
                properties:
                  profiles:
                    type: array
                    items:
                      $ref: "#/components/schemas/EvaluationProfile"
  /v1/evaluation-profiles/{id}:
    put:
      summary: Create or update a saved evaluation test profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluationProfileWrite"
      responses:
        "200":
          description: Saved evaluation profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  profile:
                    $ref: "#/components/schemas/EvaluationProfile"
    delete:
      summary: Delete a saved evaluation test profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted marker
