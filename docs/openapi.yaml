      summary: Diff a message version against the current message or another version
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: integer
        - name: compare_to
          in: query
          schema:
            oneOf:
              - type: integer
              - type: string
                enum: [current]
            default: current
      responses:
        "200":
          description: Path-based message diff summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageVersionDiff"
  /v1/evaluation-profiles:
    get:
      summary: List saved evaluation test profiles
      parameters:
        - name: decision_key
