              type:
                type: string
              dimension:
                type: string
        segments:
          type: array
          items:
            type: object
            required: [name]
            properties:
              name:
                type: string
              type:
                type: string
        context:
          type: array
          items:
            type: object
            required: [name]
            properties:
              name:
                type: string
              type:
                type: string
    SchemaImportDiagnostics:
      type: object
      properties:
        summary:
          type: object
          properties:
            imported:
              type: integer
            skipped:
              type: integer
            failed:
              type: integer
        attributes:
          type: object
        segments:
          type: object
        context:
          type: object
    MeiroDelivery:
      type: object
      properties:
        id:
          type: string
        target:
          type: string
        endpoint:
          type: string
        ok:
