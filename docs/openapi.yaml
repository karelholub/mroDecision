openapi: 3.1.0
info:
  title: Meiro Decision & Eligibility Engine API
  version: 0.1.0
  description: REST API for real-time profile decision and eligibility evaluation.
servers:
  - url: http://localhost:8090
    description: Docker Compose local service
  - url: http://localhost:8080
    description: Direct Node.js local service
security:
  - bearerAuth: []
paths:
  /v1/health:
    get:
      security: []
      summary: Service health check
      responses:
        "200":
          description: Service health payload
          content:
            application/json:
              schema:
                type: object
                required: [status, service, now]
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: meiro-decision-engine
                  now:
                    type: string
                    format: date-time
  /v1/ready:
    get:
      security: []
      summary: Readiness check with database status
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Readiness"
        "503":
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Readiness"
  /v1/evaluate:
    post:
      summary: Evaluate one profile against a published rule set
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluateRequest"
            examples:
              nextBestOffer:
                value:
                  decision_key: next_best_offer
                  profile_key: profile-123
                  identifiers:
                    - typeId: email
                      value: user@example.com
                  attributes:
                    lead_score:
                      - value: 82
                    web_engagement_score:
                      - value: 71
                    interacted_promotions:
                      - value: [retention_discount]
                    customer_lifetime_value:
                      - value: 12400
                    monetary_rfm:
                      - value: 5
                    churn_risk_score:
                      - value: 0.2
                    outstanding_balance_tier:
                      - value: low
                    late_payments_count_12m:
                      - value: 0
                    survey_nps_latest:
                      - value: 8
                    sustainability_score:
                      - value: 91
                  context:
                    channel: email
                    request_source: meiro_pipes
      responses:
        "200":
          description: Decision result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluateResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /v1/evaluate/batch:
    post:
      summary: Evaluate up to 500 profiles
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision_key, profiles]
              properties:
                decision_key:
                  type: string
                rule_version:
                  type: integer
                  nullable: true
                profiles:
                  type: array
                  maxItems: 500
                  items:
                    $ref: "#/components/schemas/EvaluateRequestProfile"
      responses:
        "200":
          description: Batch decision results
          content:
            application/json:
              schema:
                type: object
                required: [results]
                properties:
                  results:
                    type: array
                    items:
                      $ref: "#/components/schemas/EvaluateResponse"
  /v1/client/evaluate:
    post:
      summary: Evaluate an app-facing decision, in-app message, or experiment
      description: Requires a token with the `client` scope. Tokens can optionally restrict the allowed `decision_key` values. Sparse website requests should send identifiers plus request context; when attributes/segments are omitted, the engine hydrates the profile from the configured Meiro Profile API using the supplied identifier and profile cache TTL. Use `context.profile_enrichment = "always"` to force lookup even when local attributes are present, or `"off"` to disable lookup for a request.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientEvaluateRequest"
            examples:
              experiment:
                value:
                  decision_key: homepage_hero_experiment
                  profile_key: profile-123
                  identifiers:
                    - typeId: email
                      value: user@example.com
                  attributes: {}
                  segments: {}
                  context:
                    channel: web
                    surface: homepage_hero
                    profile_enrichment: always
      responses:
        "200":
          description: Client-safe decision response with cache hints
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientEvaluateResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /v1/client/rule-catalog:
    get:
      summary: List published client-safe decision rules and required inputs
      description: Requires a token with the `client` scope. Tokens with a decision-key allow-list only see allowed rules. The response omits draft logic and returns inferred input fields for browser-side form builders.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Published rule catalog for client-side form rendering
          content:
            application/json:
              schema:
                type: object
                required: [rule_sets]
                properties:
                  rule_sets:
                    type: array
                    items:
                      $ref: "#/components/schemas/ClientRuleCatalogItem"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
  /v1/client/surface:
    post:
      summary: Evaluate all published in-app messages for a surface and return the highest-priority eligible result
      description: Requires a token with the `client` scope. Tokens with a decision-key allow-list only evaluate allowed rules. Message responses enforce library status, surface, starts/expires windows, and message frequency TTL before selecting a result.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientSurfaceRequest"
      responses:
        "200":
          description: Surface-selected in-app message response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientSurfaceResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
  /v1/client/surface/batch:
    post:
      summary: Precompute in-app message eligibility and content for a batch of profiles
      description: Requires a token with the `client` scope. Intended for Meiro Pipes segment exports. Evaluates all published `inapp_message` rules for the requested surface per profile and returns the selected message content plus compact candidate diagnostics. Individual profile failures are returned in the corresponding result item.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientSurfaceBatchRequest"
            examples:
              precompute:
                value:
                  surface: homepage_hero
                  limit: 20
                  context:
                    channel: web
                    request_source: meiro_pipes_inapp_precompute
                  profiles:
                    - profile_key: profile-123
                      identifiers:
                        - typeId: email
                          value: user@example.com
                      attributes: {}
                      segments: {}
                      context:
                        profile_enrichment: off
      responses:
        "200":
          description: Batch in-app message precompute results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientSurfaceBatchResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
  /v1/client/impression:
    post:
      summary: Record an in-app message impression
      description: Requires a token with the `client` scope. Used when a message or placement was rendered.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientEventRequest"
      responses:
        "200":
          description: Duplicate client event ignored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientEventResponse"
        "202":
          description: Accepted client event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientEventResponse"
  /v1/client/exposure:
    post:
      summary: Record an experiment exposure
      description: Requires a token with the `client` scope. Used when a variant assignment was actually exposed to the customer.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientEventRequest"
      responses:
        "200":
          description: Duplicate client event ignored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientEventResponse"
        "202":
          description: Accepted client event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientEventResponse"
  /v1/client/conversion:
    post:
      summary: Record an experiment conversion
      description: Requires a token with the `client` scope. Used when a customer completes a tracked outcome after variant exposure.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientEventRequest"
      responses:
        "200":
          description: Duplicate client event ignored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientEventResponse"
        "202":
          description: Accepted client event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientEventResponse"
  /v1/assistant/plan:
    post:
      summary: Create a guarded assistant draft plan
      description: Converts a configuration request into a draft-only plan. Requires editor scope. Does not mutate state.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantPlanRequest"
      responses:
        "200":
          description: Guarded assistant plan
          content:
            application/json:
              schema:
                type: object
                properties:
                  plan:
                    $ref: "#/components/schemas/AssistantPlan"
  /v1/assistant/apply:
    post:
      summary: Apply a guarded assistant draft plan
      description: Applies draft-only assistant actions. Publishing still requires the normal publish flow.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan]
              properties:
                plan:
                  $ref: "#/components/schemas/AssistantPlan"
      responses:
        "200":
          description: Applied draft actions
          content:
            application/json:
              schema:
                type: object
                properties:
                  applied:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
  /v1/rule-sets:
    get:
      summary: List rule sets
      responses:
        "200":
          description: Rule set list
          content:
            application/json:
              schema:
                type: object
                required: [rule_sets]
                properties:
                  rule_sets:
                    type: array
                    items:
                      $ref: "#/components/schemas/RuleSetSummary"
    post:
      summary: Create a rule set draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleSetWrite"
      responses:
        "201":
          description: Created rule set
          content:
            application/json:
              schema:
                type: object
                properties:
                  rule_set:
                    $ref: "#/components/schemas/RuleSetSummary"
  /v1/metrics:
    get:
      summary: Get operational service and rule usage metrics
      responses:
        "200":
          description: Metrics summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  metrics:
                    $ref: "#/components/schemas/Metrics"
  /v1/metrics/rule/{key}:
    get:
      summary: Get operational usage metrics for one rule set
      parameters:
        - $ref: "#/components/parameters/RuleSetKey"
      responses:
        "200":
          description: Rule metrics summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  metrics:
                    $ref: "#/components/schemas/RuleMetrics"
  /v1/metrics/client-events:
    get:
      summary: Get client event reports for impressions and exposures
      parameters:
        - name: decision_key
          in: query
          schema:
            type: string
        - name: profile_key
          in: query
          schema:
            type: string
        - name: event_type
          in: query
          schema:
            type: string
            enum: [impression, exposure, conversion]
        - name: variant_key
          in: query
          schema:
            type: string
        - name: message_id
          in: query
          schema:
            type: string
        - name: surface
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Client event grouped reports
          content:
            application/json:
              schema:
                type: object
                properties:
                  metrics:
                    $ref: "#/components/schemas/ClientEventMetrics"
  /v1/experiments:
    get:
      summary: Get experiment operations status and variant feedback rollups
      parameters:
        - name: format
          in: query
          schema:
            type: string
            enum: [json, csv]
      responses:
        "200":
          description: Experiment operations dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExperimentOperations"
            text/csv:
              schema:
                type: string
  /v1/campaigns:
    get:
      summary: Get campaign-level operational rollups
      parameters:
        - name: window_hours
          in: query
          schema:
            type: integer
            default: 24
        - name: limit
          in: query
          schema:
            type: integer
            default: 12
      responses:
        "200":
          description: Campaign-level rule, message, traffic, and feedback rollups
          content:
            application/json:
              schema:
                type: object
                properties:
                  campaigns:
                    type: array
                    items:
                      $ref: "#/components/schemas/CampaignOperation"
  /v1/campaigns/actions:
    post:
      summary: Preview or apply a campaign bulk action
      description: Supports dry-run previews and guarded execution for campaign-scoped review submission and archive actions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignActionRequest"
      responses:
        "200":
          description: Campaign action preview or execution result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignActionResult"
  /v1/rule-sets/{key}:
    get:
      summary: Get a rule set with draft and latest published version
      parameters:
        - $ref: "#/components/parameters/RuleSetKey"
      responses:
        "200":
          description: Rule set details
          content:
            application/json:
              schema:
                type: object
                required: [rule_set, draft, version]
                properties:
                  rule_set:
                    $ref: "#/components/schemas/RuleSetSummary"
                  draft:
                    $ref: "#/components/schemas/RuleDefinition"
                  version:
                    $ref: "#/components/schemas/RuleVersion"
  /v1/rule-sets/{key}/draft:
    put:
      summary: Replace the mutable draft for a rule set
      parameters:
        - $ref: "#/components/parameters/RuleSetKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleSetWrite"
      responses:
        "200":
          description: Updated draft
          content:
            application/json:
              schema:
                type: object
                properties:
                  rule_set:
                    $ref: "#/components/schemas/RuleSetSummary"
                  draft:
                    $ref: "#/components/schemas/RuleDefinition"
  /v1/rule-sets/{key}/publish:
    post:
      summary: Publish the current draft
      parameters:
        - $ref: "#/components/parameters/RuleSetKey"
      responses:
        "200":
          description: Published version
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    $ref: "#/components/schemas/RuleVersion"
  /v1/rule-sets/{key}/archive:
    post:
      summary: Archive a rule set
      parameters:
        - $ref: "#/components/parameters/RuleSetKey"
      responses:
        "200":
          description: Archived rule set
          content:
            application/json:
              schema:
                type: object
                properties:
                  rule_set:
                    $ref: "#/components/schemas/RuleSetSummary"
  /v1/rule-sets/{key}/duplicate:
    post:
      summary: Duplicate a rule set into a new draft
      parameters:
        - $ref: "#/components/parameters/RuleSetKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                decision_key:
                  type: string
      responses:
        "201":
          description: Duplicated draft rule set
          content:
            application/json:
              schema:
                type: object
                properties:
                  rule_set:
                    $ref: "#/components/schemas/RuleSetSummary"
                  draft:
                    $ref: "#/components/schemas/RuleDefinition"
  /v1/rule-sets/{key}/test:
    post:
      summary: Test the current draft for a rule set without writing an audit entry
      parameters:
        - $ref: "#/components/parameters/RuleSetKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluateRequestProfile"
      responses:
        "200":
          description: Draft decision result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EvaluateResponse"
                  - type: object
                    properties:
                      tested_version:
                        type: string
                        const: draft
  /v1/rule-sets/{key}/test-published:
    post:
      summary: Test the published version for a rule set without writing an audit entry
      parameters:
        - $ref: "#/components/parameters/RuleSetKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluateRequestProfile"
      responses:
        "200":
          description: Published evaluation result without audit write
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EvaluateResponse"
                  - type: object
                    properties:
                      tested_version:
                        type: string
                        const: published
  /v1/rule-sets/{key}/versions:
    get:
      summary: List published versions for a rule set
      parameters:
        - $ref: "#/components/parameters/RuleSetKey"
      responses:
        "200":
          description: Version list without definitions
          content:
            application/json:
              schema:
                type: object
                properties:
                  versions:
                    type: array
                    items:
                      type: object
  /v1/rule-sets/{key}/versions/{version}:
    get:
      summary: Get one published version
      parameters:
        - $ref: "#/components/parameters/RuleSetKey"
        - name: version
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Published version
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    $ref: "#/components/schemas/RuleVersion"
  /v1/rule-sets/{key}/versions/{version}/diff:
    get:
      summary: Diff a published version against the current draft or another version
      parameters:
        - $ref: "#/components/parameters/RuleSetKey"
        - name: version
          in: path
          required: true
          schema:
            type: integer
        - name: compare_to
          in: query
          schema:
            oneOf:
              - type: integer
              - type: string
                enum: [draft]
            default: draft
      responses:
        "200":
          description: Path-based diff summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  left:
                    type: object
                  right:
                    type: object
                  diff:
                    type: array
                    items:
                      type: object
  /v1/rule-sets/{key}/versions/{version}/rollback:
    post:
      summary: Restore a published version into the current draft
      parameters:
        - $ref: "#/components/parameters/RuleSetKey"
        - name: version
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated draft restored from the published version
          content:
            application/json:
              schema:
                type: object
                properties:
                  rule_set:
                    $ref: "#/components/schemas/RuleSetSummary"
                  draft:
                    $ref: "#/components/schemas/RuleDefinition"
  /v1/audit:
    get:
      summary: Query the evaluation audit log
      parameters:
        - name: decision_key
          in: query
          schema:
            type: string
        - name: profile_key
          in: query
          schema:
            type: string
        - name: result
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: format
          in: query
          schema:
            type: string
            enum: [json, csv]
      responses:
        "200":
          description: Audit entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  audit:
                    type: array
                    items:
                      type: object
            text/csv:
              schema:
                type: string
  /v1/lookup-tables:
    get:
      summary: List lookup tables
      responses:
        "200":
          description: Lookup tables
          content:
            application/json:
              schema:
                type: object
                properties:
                  lookup_tables:
                    type: array
                    items:
                      $ref: "#/components/schemas/LookupTable"
  /v1/lookup-tables/{id}:
    put:
      summary: Replace a lookup table
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LookupTableWrite"
      responses:
        "200":
          description: Replaced lookup table
          content:
            application/json:
              schema:
                type: object
                properties:
                  lookup_table:
                    $ref: "#/components/schemas/LookupTable"
  /v1/lookup-tables/{id}/export:
    get:
      summary: Export a lookup table as CSV
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: format
          in: query
          schema:
            type: string
            enum: [csv]
      responses:
        "200":
          description: Lookup table CSV
          content:
            text/csv:
              schema:
                type: string
  /v1/lookup-tables/{id}/versions:
    get:
      summary: List lookup table versions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lookup table versions
          content:
            application/json:
              schema:
                type: object
                properties:
                  versions:
                    type: array
                    items:
                      $ref: "#/components/schemas/LookupTableVersion"
  /v1/lookup-tables/{id}/versions/{version}:
    get:
      summary: Get a lookup table version
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lookup table version
          content:
            application/json:
              schema:
                type: object
                properties:
                  lookup_table:
                    $ref: "#/components/schemas/LookupTable"
  /v1/messages:
    get:
      summary: List in-app message library items
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, archived]
        - name: surface
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Message library items
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/Message"
  /v1/message-assets:
    get:
      summary: List managed message image assets
      responses:
        "200":
          description: Managed message assets with usage references
          content:
            application/json:
              schema:
                type: object
                properties:
                  assets:
                    type: array
                    items:
                      $ref: "#/components/schemas/MessageAsset"
    post:
      summary: Upload a managed message image asset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filename, content_type]
              properties:
                filename:
                  type: string
                content_type:
                  type: string
                  enum: [image/gif, image/jpeg, image/png, image/svg+xml, image/webp]
                data_url:
                  type: string
                  description: Base64 data URL for browser uploads.
                base64:
                  type: string
                  description: Raw base64 image content for scripted uploads.
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        "201":
          description: Uploaded message asset
          content:
            application/json:
              schema:
                type: object
                properties:
                  asset:
                    $ref: "#/components/schemas/MessageAsset"
  /v1/message-assets/cleanup:
    post:
      summary: Delete unused managed message assets
      responses:
        "200":
          description: Cleanup result
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                  assets:
                    type: array
                    items:
                      $ref: "#/components/schemas/MessageAsset"
  /v1/message-assets/{id}:
    delete:
      summary: Delete a managed message asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: force
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Deleted asset
  /v1/message-assets/{id}/content:
    get:
      summary: Fetch managed message asset image content
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Image bytes
          content:
            image/png: {}
            image/jpeg: {}
            image/webp: {}
            image/gif: {}
            image/svg+xml: {}
  /v1/messages/{id}:
    put:
      summary: Create or update an in-app message library item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageWrite"
      responses:
        "200":
          description: Saved message
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    $ref: "#/components/schemas/Message"
  /v1/messages/{id}/versions:
    get:
      summary: List durable message versions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Message version summaries
          content:
            application/json:
              schema:
                type: object
                properties:
                  versions:
                    type: array
                    items:
                      $ref: "#/components/schemas/MessageVersionSummary"
  /v1/messages/{id}/versions/{version}:
    get:
      summary: Get a durable message version snapshot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Message version snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    $ref: "#/components/schemas/Message"
  /v1/messages/{id}/versions/{version}/diff:
