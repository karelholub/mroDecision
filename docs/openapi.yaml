                    type: integer
        result_distribution:
          type: array
          items:
            type: object
            properties:
              result:
                type: string
              count:
                type: integer
        rule_usage:
          type: array
          items:
            type: object
            properties:
              decision_key:
                type: string
              requests:
                type: integer
              requests_24h:
                type: integer
              unique_profiles:
                type: integer
              last_evaluated_at:
                type: string
