openapi: 3.1.0
info:
  title: Meiro Decision & Eligibility Engine API
  version: 0.1.0
  description: REST API for real-time profile decision and eligibility evaluation.
servers:
  - url: http://localhost:8090
    description: Docker Compose local service
  - url: http://localhost:8080
    description: Direct Node.js local service
security:
  - bearerAuth: []
paths:
  /v1/health:
    get:
      security: []
      summary: Service health check
      responses:
        "200":
          description: Service health payload
          content:
            application/json:
              schema:
                type: object
                required: [status, service, now]
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: meiro-decision-engine
                  now:
                    type: string
                    format: date-time
  /v1/ready:
    get:
      security: []
      summary: Readiness check with database status
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Readiness"
        "503":
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Readiness"
  /v1/evaluate:
    post:
      summary: Evaluate one profile against a published rule set
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluateRequest"
            examples:
              nextBestOffer:
                value:
                  decision_key: next_best_offer
                  profile_key: profile-123
                  identifiers:
                    - typeId: email
                      value: user@example.com
                  attributes:
                    lead_score:
                      - value: 82
                    web_engagement_score:
                      - value: 71
                    interacted_promotions:
                      - value: [retention_discount]
                    customer_lifetime_value:
                      - value: 12400
                    monetary_rfm:
                      - value: 5
                    churn_risk_score:
                      - value: 0.2
                    outstanding_balance_tier:
                      - value: low
                    late_payments_count_12m:
                      - value: 0
                    survey_nps_latest:
                      - value: 8
                    sustainability_score:
                      - value: 91
                  context:
                    channel: email
                    request_source: meiro_pipes
      responses:
        "200":
          description: Decision result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluateResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /v1/evaluate/batch:
    post:
      summary: Evaluate up to 500 profiles
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision_key, profiles]
              properties:
                decision_key:
                  type: string
                rule_version:
                  type: integer
                  nullable: true
                profiles:
                  type: array
                  maxItems: 500
                  items:
                    $ref: "#/components/schemas/EvaluateRequestProfile"
      responses:
        "200":
          description: Batch decision results
          content:
            application/json:
              schema:
                type: object
                required: [results]
                properties:
                  results:
                    type: array
                    items:
                      $ref: "#/components/schemas/EvaluateResponse"
  /v1/client/evaluate:
    post:
      summary: Evaluate an app-facing decision, in-app message, or experiment
      description: Requires a token with the `client` scope. Tokens can optionally restrict the allowed `decision_key` values. When the request does not include profile attributes, the engine can hydrate the profile from the configured Meiro Profile API using the supplied identifier and profile cache TTL.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientEvaluateRequest"
            examples:
              experiment:
                value:
                  decision_key: homepage_hero_experiment
                  profile_key: profile-123
                  identifiers:
                    - typeId: email
                      value: user@example.com
                  attributes: {}
                  segments: {}
                  context:
                    channel: web
      responses:
        "200":
          description: Client-safe decision response with cache hints
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientEvaluateResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /v1/client/surface:
    post:
      summary: Evaluate all published in-app messages for a surface and return the highest-priority eligible result
      description: Requires a token with the `client` scope. Tokens with a decision-key allow-list only evaluate allowed rules. Message responses enforce library status, surface, starts/expires windows, and message frequency TTL before selecting a result.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientSurfaceRequest"
      responses:
        "200":
          description: Surface-selected in-app message response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientSurfaceResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
  /v1/client/impression:
    post:
      summary: Record an in-app message impression
      description: Requires a token with the `client` scope. Used when a message or placement was rendered.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientEventRequest"
      responses:
        "200":
          description: Duplicate client event ignored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientEventResponse"
        "202":
          description: Accepted client event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientEventResponse"
  /v1/client/exposure:
    post:
      summary: Record an experiment exposure
      description: Requires a token with the `client` scope. Used when a variant assignment was actually exposed to the customer.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientEventRequest"
      responses:
        "200":
          description: Duplicate client event ignored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientEventResponse"
        "202":
          description: Accepted client event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientEventResponse"
  /v1/client/conversion:
    post:
      summary: Record an experiment conversion
      description: Requires a token with the `client` scope. Used when a customer completes a tracked outcome after variant exposure.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientEventRequest"
      responses:
        "200":
          description: Duplicate client event ignored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientEventResponse"
        "202":
          description: Accepted client event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientEventResponse"
  /v1/assistant/plan:
    post:
      summary: Create a guarded assistant draft plan
      description: Converts a configuration request into a draft-only plan. Requires editor scope. Does not mutate state.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantPlanRequest"
      responses:
        "200":
          description: Guarded assistant plan
          content:
            application/json:
              schema:
                type: object
                properties:
                  plan:
                    $ref: "#/components/schemas/AssistantPlan"
  /v1/assistant/apply:
    post:
      summary: Apply a guarded assistant draft plan
      description: Applies draft-only assistant actions. Publishing still requires the normal publish flow.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan]
              properties:
                plan:
                  $ref: "#/components/schemas/AssistantPlan"
      responses:
        "200":
          description: Applied draft actions
          content:
            application/json:
              schema:
                type: object
                properties:
                  applied:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
  /v1/rule-sets:
    get:
      summary: List rule sets
      responses:
        "200":
          description: Rule set list
          content:
            application/json:
              schema:
                type: object
                required: [rule_sets]
                properties:
                  rule_sets:
                    type: array
                    items:
                      $ref: "#/components/schemas/RuleSetSummary"
    post:
      summary: Create a rule set draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleSetWrite"
      responses:
        "201":
          description: Created rule set
          content:
            application/json:
              schema:
                type: object
                properties:
                  rule_set:
                    $ref: "#/components/schemas/RuleSetSummary"
  /v1/metrics:
    get:
      summary: Get operational service and rule usage metrics
      responses:
        "200":
          description: Metrics summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  metrics:
                    $ref: "#/components/schemas/Metrics"
  /v1/metrics/rule/{key}:
    get:
      summary: Get operational usage metrics for one rule set
      parameters:
        - $ref: "#/components/parameters/RuleSetKey"
      responses:
        "200":
          description: Rule metrics summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  metrics:
                    $ref: "#/components/schemas/RuleMetrics"
  /v1/metrics/client-events:
    get:
      summary: Get client event reports for impressions and exposures
      parameters:
        - name: decision_key
          in: query
          schema:
            type: string
        - name: profile_key
          in: query
          schema:
            type: string
        - name: event_type
          in: query
          schema:
            type: string
            enum: [impression, exposure, conversion]
        - name: variant_key
          in: query
          schema:
            type: string
        - name: message_id
          in: query
          schema:
            type: string
        - name: surface
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Client event grouped reports
          content:
            application/json:
              schema:
                type: object
                properties:
                  metrics:
                    $ref: "#/components/schemas/ClientEventMetrics"
  /v1/experiments:
    get:
      summary: Get experiment operations status and variant feedback rollups
      parameters:
        - name: format
          in: query
          schema:
            type: string
            enum: [json, csv]
      responses:
        "200":
          description: Experiment operations dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExperimentOperations"
            text/csv:
              schema:
                type: string
  /v1/rule-sets/{key}:
    get:
      summary: Get a rule set with draft and latest published version
      parameters:
        - $ref: "#/components/parameters/RuleSetKey"
      responses:
        "200":
          description: Rule set details
          content:
            application/json:
              schema:
                type: object
                required: [rule_set, draft, version]
                properties:
                  rule_set:
                    $ref: "#/components/schemas/RuleSetSummary"
                  draft:
                    $ref: "#/components/schemas/RuleDefinition"
                  version:
                    $ref: "#/components/schemas/RuleVersion"
  /v1/rule-sets/{key}/draft:
    put:
      summary: Replace the mutable draft for a rule set
      parameters:
        - $ref: "#/components/parameters/RuleSetKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleSetWrite"
      responses:
        "200":
          description: Updated draft
          content:
            application/json:
              schema:
                type: object
                properties:
                  rule_set:
                    $ref: "#/components/schemas/RuleSetSummary"
                  draft:
                    $ref: "#/components/schemas/RuleDefinition"
  /v1/rule-sets/{key}/publish:
    post:
      summary: Publish the current draft
      parameters:
        - $ref: "#/components/parameters/RuleSetKey"
      responses:
        "200":
          description: Published version
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    $ref: "#/components/schemas/RuleVersion"
  /v1/rule-sets/{key}/archive:
    post:
      summary: Archive a rule set
      parameters:
        - $ref: "#/components/parameters/RuleSetKey"
      responses:
        "200":
          description: Archived rule set
          content:
            application/json:
              schema:
                type: object
                properties:
                  rule_set:
                    $ref: "#/components/schemas/RuleSetSummary"
  /v1/rule-sets/{key}/duplicate:
    post:
      summary: Duplicate a rule set into a new draft
      parameters:
        - $ref: "#/components/parameters/RuleSetKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                decision_key:
                  type: string
      responses:
        "201":
          description: Duplicated draft rule set
          content:
            application/json:
              schema:
                type: object
                properties:
                  rule_set:
                    $ref: "#/components/schemas/RuleSetSummary"
                  draft:
                    $ref: "#/components/schemas/RuleDefinition"
  /v1/rule-sets/{key}/test:
    post:
      summary: Test the current draft for a rule set without writing an audit entry
      parameters:
        - $ref: "#/components/parameters/RuleSetKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluateRequestProfile"
      responses:
        "200":
          description: Draft decision result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EvaluateResponse"
                  - type: object
                    properties:
                      tested_version:
                        type: string
                        const: draft
  /v1/rule-sets/{key}/test-published:
    post:
      summary: Test the published version for a rule set without writing an audit entry
      parameters:
        - $ref: "#/components/parameters/RuleSetKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluateRequestProfile"
      responses:
        "200":
          description: Published evaluation result without audit write
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EvaluateResponse"
                  - type: object
                    properties:
                      tested_version:
                        type: string
                        const: published
  /v1/rule-sets/{key}/versions:
    get:
      summary: List published versions for a rule set
      parameters:
        - $ref: "#/components/parameters/RuleSetKey"
      responses:
        "200":
          description: Version list without definitions
          content:
            application/json:
              schema:
                type: object
                properties:
                  versions:
                    type: array
                    items:
                      type: object
  /v1/rule-sets/{key}/versions/{version}:
    get:
      summary: Get one published version
      parameters:
        - $ref: "#/components/parameters/RuleSetKey"
        - name: version
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Published version
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    $ref: "#/components/schemas/RuleVersion"
  /v1/rule-sets/{key}/versions/{version}/diff:
    get:
      summary: Diff a published version against the current draft or another version
      parameters:
        - $ref: "#/components/parameters/RuleSetKey"
        - name: version
          in: path
          required: true
          schema:
            type: integer
        - name: compare_to
          in: query
          schema:
            oneOf:
              - type: integer
              - type: string
                enum: [draft]
            default: draft
      responses:
        "200":
          description: Path-based diff summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  left:
                    type: object
                  right:
                    type: object
                  diff:
                    type: array
                    items:
                      type: object
  /v1/rule-sets/{key}/versions/{version}/rollback:
    post:
      summary: Restore a published version into the current draft
      parameters:
        - $ref: "#/components/parameters/RuleSetKey"
        - name: version
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated draft restored from the published version
          content:
            application/json:
              schema:
                type: object
                properties:
                  rule_set:
                    $ref: "#/components/schemas/RuleSetSummary"
                  draft:
                    $ref: "#/components/schemas/RuleDefinition"
  /v1/audit:
    get:
      summary: Query the evaluation audit log
      parameters:
        - name: decision_key
          in: query
          schema:
            type: string
        - name: profile_key
          in: query
          schema:
            type: string
        - name: result
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: format
          in: query
          schema:
            type: string
            enum: [json, csv]
      responses:
        "200":
          description: Audit entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  audit:
                    type: array
                    items:
                      type: object
            text/csv:
              schema:
                type: string
  /v1/lookup-tables:
    get:
      summary: List lookup tables
      responses:
        "200":
          description: Lookup tables
          content:
            application/json:
              schema:
                type: object
                properties:
                  lookup_tables:
                    type: array
                    items:
                      $ref: "#/components/schemas/LookupTable"
  /v1/lookup-tables/{id}:
    put:
      summary: Replace a lookup table
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LookupTableWrite"
      responses:
        "200":
          description: Replaced lookup table
          content:
            application/json:
              schema:
                type: object
                properties:
                  lookup_table:
                    $ref: "#/components/schemas/LookupTable"
  /v1/lookup-tables/{id}/export:
    get:
      summary: Export a lookup table as CSV
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: format
          in: query
          schema:
            type: string
            enum: [csv]
      responses:
        "200":
          description: Lookup table CSV
          content:
            text/csv:
              schema:
                type: string
  /v1/lookup-tables/{id}/versions:
    get:
      summary: List lookup table versions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lookup table versions
          content:
            application/json:
              schema:
                type: object
                properties:
                  versions:
                    type: array
                    items:
                      $ref: "#/components/schemas/LookupTableVersion"
  /v1/lookup-tables/{id}/versions/{version}:
    get:
      summary: Get a lookup table version
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lookup table version
          content:
            application/json:
              schema:
                type: object
                properties:
                  lookup_table:
                    $ref: "#/components/schemas/LookupTable"
  /v1/messages:
    get:
      summary: List in-app message library items
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, archived]
        - name: surface
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Message library items
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/Message"
  /v1/messages/{id}:
    put:
      summary: Create or update an in-app message library item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageWrite"
      responses:
        "200":
          description: Saved message
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    $ref: "#/components/schemas/Message"
  /v1/evaluation-profiles:
    get:
      summary: List saved evaluation test profiles
      parameters:
        - name: decision_key
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Saved evaluation profiles
          content:
            application/json:
              schema:
                type: object
                properties:
                  profiles:
                    type: array
                    items:
                      $ref: "#/components/schemas/EvaluationProfile"
  /v1/evaluation-profiles/{id}:
    put:
      summary: Create or update a saved evaluation test profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluationProfileWrite"
      responses:
        "200":
          description: Saved evaluation profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  profile:
                    $ref: "#/components/schemas/EvaluationProfile"
    delete:
      summary: Delete a saved evaluation test profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted marker
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
  /v1/condition-blocks:
    get:
      summary: List reusable rule condition blocks
      responses:
        "200":
          description: Reusable condition blocks
          content:
            application/json:
              schema:
                type: object
                properties:
                  condition_blocks:
                    type: array
                    items:
                      $ref: "#/components/schemas/ConditionBlock"
  /v1/condition-blocks/{id}:
    put:
      summary: Create or update a reusable condition block
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConditionBlockWrite"
      responses:
        "200":
          description: Saved condition block
          content:
            application/json:
              schema:
                type: object
                properties:
                  condition_block:
                    $ref: "#/components/schemas/ConditionBlock"
    delete:
      summary: Delete a reusable condition block
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted marker
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
  /v1/schema:
    get:
      summary: List cached Meiro schema items
      parameters:
        - name: kind
          in: query
          schema:
            type: string
            enum: [attribute, segment, context]
      responses:
        "200":
          description: Cached schema items
          content:
            application/json:
              schema:
                type: object
                properties:
                  schema:
                    type: array
                    items:
                      $ref: "#/components/schemas/SchemaItem"
  /v1/schema/import:
    post:
      summary: Manually import Meiro schema items
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SchemaImport"
      responses:
        "200":
          description: Imported schema items by kind
          content:
            application/json:
              schema:
                type: object
                properties:
                  imported:
                    type: object
                  diagnostics:
                    $ref: "#/components/schemas/SchemaImportDiagnostics"
  /v1/meiro-deliveries:
    get:
      summary: List recent Meiro webhook and feedback delivery attempts
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: target
          in: query
          schema:
            type: string
            enum: [profile, collector, feedback]
        - name: ok
          in: query
          schema:
            type: boolean
        - name: status
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Recent Meiro delivery attempts
          content:
            application/json:
              schema:
                type: object
                properties:
                  deliveries:
                    type: array
                    items:
                      $ref: "#/components/schemas/MeiroDelivery"
                  summary:
                    $ref: "#/components/schemas/MeiroDeliverySummary"
  /v1/schema/sync:
    post:
      summary: Sync schema by sampling a Meiro profile
      description: Calls the configured Meiro Profile API endpoint with an identifier and infers attribute, segment, and context schema from the returned profile payload.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [identifier_type, identifier_value]
              properties:
                identifier_type:
                  type: string
                identifier_value:
                  type: string
                meiro_api_url:
                  type: string
                meiro_api_token:
                  type: string
      responses:
        "200":
          description: Imported schema items inferred from a profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  source:
                    type: string
                  imported:
                    type: object
                  profile_shape:
                    type: array
                    items:
                      type: string
  /v1/meiro/metadata/sync:
    post:
      summary: Sync Meiro metadata for rule authoring
      description: Uses the Meiro skill/mpcli shared API contract when a separate mpcli/shared API token is configured, with Profile API sampling as a fallback for condition-builder schema suggestions.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                meiro_skill_url:
                  type: string
                meiro_cli_url:
                  type: string
                meiro_cli_token:
                  type: string
                  description: Separate Meiro CLI/shared API token, not the Profile API token.
                meiro_api_url:
                  type: string
                meiro_api_token:
                  type: string
                  description: Profile API token used only for profile sampling fallback.
                identifier_type:
                  type: string
                identifier_value:
                  type: string
      responses:
        "200":
          description: Imported authoring metadata and diagnostics
          content:
            application/json:
              schema:
                type: object
                properties:
                  imported:
                    type: object
                  metadata:
                    type: object
                  diagnostics:
                    type: object
  /v1/export:
    get:
      summary: Export rule sets and lookup tables as a promotion bundle
      parameters:
        - name: include_audit
          in: query
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Configuration bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigBundle"
  /v1/import:
    post:
      summary: Import a promotion bundle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigBundle"
      responses:
        "200":
          description: Import summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  imported:
                    type: object
                    properties:
                      rule_sets:
                        type: integer
                      lookup_tables:
                        type: integer
  /v1/tokens:
    get:
      summary: List API tokens
      responses:
        "200":
          description: API tokens without plaintext secret values
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens:
                    type: array
                    items:
                      $ref: "#/components/schemas/ApiToken"
    post:
      summary: Create an API token
      description: The plaintext token is returned once and is never shown again.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                scopes:
                  type: array
                  items:
                    type: string
                    enum: [viewer, editor, publisher, admin, evaluate, client]
                decision_keys:
                  type: array
                  description: Optional allow-list of decision keys for client tokens. Empty means all decisions.
                  items:
                    type: string
      responses:
        "201":
          description: Created token with one-time plaintext value
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    allOf:
                      - $ref: "#/components/schemas/ApiToken"
                      - type: object
                        properties:
                          token:
                            type: string
  /v1/tokens/{id}:
    delete:
      summary: Revoke an API token
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Revoked token metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    $ref: "#/components/schemas/ApiToken"
  /v1/settings:
    get:
      summary: Get operational settings
      responses:
        "200":
          description: Settings and runtime metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  settings:
                    $ref: "#/components/schemas/Settings"
                  runtime:
                    type: object
                    properties:
                      schema_sync:
                        $ref: "#/components/schemas/SchemaSyncRuntime"
    put:
      summary: Update operational settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Settings"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  settings:
                    $ref: "#/components/schemas/Settings"
                  runtime:
                    type: object
                    properties:
                      schema_sync:
                        $ref: "#/components/schemas/SchemaSyncRuntime"
  /v1/settings/test-connection:
    post:
      summary: Test configured Meiro Profile API, collector, or feedback connectivity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target]
              properties:
                target:
                  type: string
                  enum: [profile, collector, feedback]
                meiro_url:
                  type: string
                meiro_source_slug:
                  type: string
                meiro_api_url:
                  type: string
                meiro_api_token:
                  type: string
                meiro_feedback_url:
                  type: string
                meiro_skill_url:
                  type: string
                meiro_cli_url:
                  type: string
                meiro_cli_token:
                  type: string
                identifier_type:
                  type: string
                identifier_value:
                  type: string
      responses:
        "200":
          description: Connectivity test result
          content:
            application/json:
              schema:
                type: object
                properties:
                  target:
                    type: string
                  ok:
                    type: boolean
                  status:
                    type: integer
                  endpoint:
                    type: string
                  message:
                    type: string
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    RuleSetKey:
      name: key
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-z0-9_]+$"
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: Optional retry key for client event ingestion. Used as event_id when the JSON body omits event_id.
      schema:
        type: string
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    Error:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string
    AssistantPlanRequest:
      type: object
      required: [prompt]
      properties:
        prompt:
          type: string
        type:
          type: string
          enum: [decision, inapp_message, experiment]
        decision_key:
          type: string
        surface:
          type: string
        ttl_seconds:
          type: integer
        variants:
          type: array
          items:
            type: object
            additionalProperties: true
        conditions:
          type: array
          items:
            type: object
            additionalProperties: true
    AssistantPlan:
      type: object
      required: [mode, summary, guardrails, actions]
      properties:
        mode:
          type: string
          enum: [draft_only]
        prompt:
          type: string
        summary:
          type: string
        clarifications:
          type: array
          description: Non-blocking assumptions and questions that should be reviewed before publishing.
          items:
            type: object
            properties:
              id:
                type: string
              topic:
                type: string
              question:
                type: string
              assumed:
                type: string
              options:
                type: array
                items:
                  type: string
              priority:
                type: string
                enum: [low, medium, high]
              blocking:
                type: boolean
        schema:
          type: object
          properties:
            available:
              type: integer
            matched_fields:
              type: array
              items:
                type: object
                additionalProperties: true
            missing_fields:
              type: array
              items:
                type: object
                additionalProperties: true
            suggestions:
              type: array
              items:
                type: object
                additionalProperties: true
        preview:
          type: object
          properties:
            sample_request:
              $ref: "#/components/schemas/EvaluateRequest"
            draft_evaluation:
              $ref: "#/components/schemas/EvaluateResponse"
        guardrails:
          type: object
          properties:
            status:
              type: string
              enum: [ok, review, blocked]
            errors:
              type: array
              items:
                type: string
            warnings:
              type: array
              items:
                type: string
        actions:
          type: array
          items:
            type: object
            required: [action, id, object]
            properties:
              action:
                type: string
                enum: [upsert_message, create_rule_draft, update_rule_draft]
              id:
                type: string
              object:
                type: object
                additionalProperties: true
    Readiness:
      type: object
      properties:
        status:
          type: string
          enum: [ready, not_ready]
        service:
          type: string
        now:
          type: string
          format: date-time
        database:
          type: object
          properties:
            ok:
              type: boolean
            path:
              type: string
            error:
              type: string
    Identifier:
      type: object
      required: [typeId, value]
      properties:
        typeId:
          type: string
        value:
          type: string
    AttributeValue:
      type: object
      required: [value]
      properties:
        value: {}
    EvaluateRequest:
      allOf:
        - type: object
          required: [decision_key]
          properties:
            decision_key:
              type: string
            rule_version:
              type: integer
              nullable: true
        - $ref: "#/components/schemas/EvaluateRequestProfile"
    EvaluateRequestProfile:
      type: object
      required: [profile_key, identifiers]
      properties:
        profile_key:
          type: string
        identifiers:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/Identifier"
        attributes:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: "#/components/schemas/AttributeValue"
        segments:
          type: object
          additionalProperties:
            type: boolean
        context:
          type: object
          description: Optional request context. Experiments support force_variant for QA and force_holdout or forced_holdouts[decision_key] for no-variant holdout overrides.
          additionalProperties: true
        event:
          type: object
          description: Optional conversion details such as name, value, currency, or order id.
          additionalProperties: true
    EvaluateResponse:
      type: object
      required: [decision_key, profile_key, evaluated_at, rule_version, result, outputs, matched_rules, errors]
      properties:
        decision_key:
          type: string
        profile_key:
          type: string
        evaluated_at:
          type: string
          format: date-time
        rule_version:
          type: integer
        result:
          type: string
          example: eligible
        outputs:
          type: object
          description: Decision outputs. When a message is attached, outputs.message includes content plus availability metadata; unavailable messages return a suppression_reason.
          additionalProperties: true
        matched_rules:
          type: array
          items:
            type: string
        trace:
          type: array
          description: Ordered evaluation trace. Graph decisions include node-level path details; branch decisions include branch checks.
          items:
            type: object
            additionalProperties: true
        errors:
          type: array
          items:
            type: string
    ClientEvaluateRequest:
      type: object
      required: [decision_key, profile_key]
      properties:
        decision_key:
          type: string
        profile_key:
          type: string
        identifiers:
          type: array
          items:
            $ref: "#/components/schemas/Identifier"
        attributes:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: "#/components/schemas/AttributeValue"
        segments:
          type: object
          additionalProperties:
            type: boolean
        context:
          type: object
          additionalProperties: true
    ClientEvaluateResponse:
      type: object
      required: [decision_key, profile_key, result, outputs, rule_version, ttl_seconds, matched_rules, errors]
      properties:
        decision_key:
          type: string
        profile_key:
          type: string
        result:
          type: string
        outputs:
          type: object
          additionalProperties: true
        rule_version:
          type: integer
        ttl_seconds:
          type: integer
          description: Client-side cache TTL hint from the rule-set cache policy.
        cache_scope:
          type: string
          nullable: true
        cache:
          type: object
          properties:
            hit:
              type: boolean
            scope:
              type: string
              nullable: true
            expires_at:
              type: string
              format: date-time
              nullable: true
        profile_cache:
          type: object
          description: Meiro Profile API enrichment/cache status for sparse client requests.
          properties:
            status:
              type: string
              enum: [disabled, local_payload, not_configured, hit, miss, error]
            hit:
              type: boolean
            ttl_seconds:
              type: integer
            expires_at:
              type: string
              format: date-time
              nullable: true
            reason:
              type: string
            error:
              type: string
        experiment:
          type: object
          nullable: true
          properties:
            variant_key:
              type: string
            bucket:
              type: number
              nullable: true
            holdout:
              type: boolean
            reason:
              type: string
        matched_rules:
          type: array
          items:
            type: string
        trace:
          type: array
          description: Ordered evaluation trace. Graph decisions include node-level path details; branch decisions include branch checks.
          items:
            type: object
            additionalProperties: true
        errors:
          type: array
          items:
            type: string
    ClientSurfaceRequest:
      type: object
      required: [surface, profile_key]
      properties:
        surface:
          type: string
        profile_key:
          type: string
        limit:
          type: integer
          default: 20
        identifiers:
          type: array
          items:
            $ref: "#/components/schemas/Identifier"
        attributes:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: "#/components/schemas/AttributeValue"
        segments:
          type: object
          additionalProperties:
            type: boolean
        context:
          type: object
          additionalProperties: true
    ClientSurfaceResponse:
      type: object
      required: [surface, profile_key, candidates]
      properties:
        surface:
          type: string
        profile_key:
          type: string
        selected:
          allOf:
            - $ref: "#/components/schemas/ClientEvaluateResponse"
            - type: object
              nullable: true
              properties:
                priority:
                  type: integer
                surface:
                  type: string
        candidates:
          type: array
          items:
            type: object
            properties:
              decision_key:
                type: string
              priority:
                type: integer
              result:
                type: string
              message_id:
                type: string
              matched_rules:
                type: array
                items:
                  type: string
              cache:
                type: object
                additionalProperties: true
              profile_cache:
                type: object
                additionalProperties: true
    ClientEventRequest:
      type: object
      required: [decision_key, profile_key]
      properties:
        event_id:
          type: string
          description: Optional idempotency key. Duplicate event IDs are ignored.
        decision_key:
          type: string
        profile_key:
          type: string
        rule_version:
          type: integer
          nullable: true
        variant_key:
          type: string
        message_id:
          type: string
        surface:
          type: string
        occurred_at:
          type: string
          format: date-time
        context:
          type: object
          additionalProperties: true
    ClientEventResponse:
      type: object
      required: [event, accepted, duplicate]
      properties:
        accepted:
          type: boolean
          description: True when the event was newly stored.
        duplicate:
          type: boolean
          description: True when an existing event with the same idempotency key was ignored.
        event:
          type: object
          properties:
            event_id:
              type: string
            event_type:
              type: string
              enum: [impression, exposure, conversion]
            occurred_at:
              type: string
              format: date-time
            decision_key:
              type: string
            profile_key:
              type: string
            rule_version:
              type: integer
              nullable: true
            variant_key:
              type: string
            message_id:
              type: string
            surface:
              type: string
            context:
              type: object
            accepted:
              type: boolean
            duplicate:
              type: boolean
    RuleSetSummary:
      type: object
      required: [name, decision_key, status]
      properties:
        name:
          type: string
        decision_key:
          type: string
        description:
          type: string
        input_schema:
          type: object
        output_schema:
          type: object
        type:
          type: string
          enum: [decision, inapp_message, experiment]
        priority:
          type: integer
        surface:
          type: string
        cache_policy:
          type: object
        metadata:
          $ref: "#/components/schemas/RuleSetMetadata"
        author:
          type: string
        version:
          type: integer
          nullable: true
        status:
          type: string
          enum: [draft, published, archived]
        tags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        last_published_at:
          type: string
          format: date-time
          nullable: true
    RuleSetWrite:
      type: object
      required: [name, decision_key, draft]
      properties:
        name:
          type: string
        decision_key:
          type: string
        description:
          type: string
        input_schema:
          type: object
        output_schema:
          type: object
        type:
          type: string
          enum: [decision, inapp_message, experiment]
        priority:
          type: integer
        surface:
          type: string
        cache_policy:
          type: object
        metadata:
          $ref: "#/components/schemas/RuleSetMetadata"
        tags:
          type: array
          items:
            type: string
        draft:
          $ref: "#/components/schemas/RuleDefinition"
    RuleDefinition:
      type: object
      additionalProperties: true
      description: Basic branch definition or advanced graph definition. See docs/rule-format.md.
    RuleSetMetadata:
      type: object
      additionalProperties: true
      properties:
        experiment:
          type: object
          properties:
            status:
              type: string
              enum: [draft, running, paused]
            unit:
              type: string
              enum: [profile, identifier]
            variants:
              type: array
              items:
                type: object
                required: [key, weight]
                properties:
                  key:
                    type: string
                  weight:
                    type: number
                    minimum: 0
                  outputs:
                    type: object
                    additionalProperties: true
    RuleVersion:
      type: object
      required: [version, published_at, author, definition]
      properties:
        version:
          type: integer
        published_at:
          type: string
          format: date-time
        author:
          type: string
        definition:
          $ref: "#/components/schemas/RuleDefinition"
        metadata:
          $ref: "#/components/schemas/RuleSetMetadata"
    LookupTable:
      type: object
      required: [id, name, key_column, rows, version]
      properties:
        id:
          type: string
        name:
          type: string
        key_column:
          type: string
        rows:
          type: array
          items:
            type: object
            additionalProperties: true
        updated_at:
          type: string
          format: date-time
        author:
          type: string
        version:
          type: integer
    LookupTableWrite:
      type: object
      properties:
        name:
          type: string
        key_column:
          type: string
        rows:
          type: array
          items:
            type: object
            additionalProperties: true
    LookupTableVersion:
      type: object
      required: [id, version, name, key_column, row_count, updated_at, author]
      properties:
        id:
          type: string
        version:
          type: integer
        name:
          type: string
        key_column:
          type: string
        row_count:
          type: integer
        updated_at:
          type: string
          format: date-time
        author:
          type: string
    Message:
      type: object
      required: [id, name, status, default_content]
      properties:
        id:
          type: string
        name:
          type: string
        surface:
          type: string
        status:
          type: string
          enum: [active, archived]
        content_schema:
          type: object
          additionalProperties: true
        default_content:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
        updated_at:
          type: string
          format: date-time
        author:
          type: string
    MessageWrite:
      type: object
      properties:
        name:
          type: string
        surface:
          type: string
        status:
          type: string
          enum: [active, archived]
        content_schema:
          type: object
          additionalProperties: true
        default_content:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
    EvaluationProfile:
      type: object
      required: [id, name, request]
      properties:
        id:
          type: string
        name:
          type: string
        decision_key:
          type: string
        profile_key:
          type: string
        request:
          $ref: "#/components/schemas/EvaluateRequest"
        notes:
          type: string
        updated_at:
          type: string
          format: date-time
        author:
          type: string
    EvaluationProfileWrite:
      type: object
      required: [name, request]
      properties:
        name:
          type: string
        decision_key:
          type: string
        profile_key:
          type: string
        request:
          $ref: "#/components/schemas/EvaluateRequest"
        notes:
          type: string
    ConditionBlock:
      type: object
      required: [id, name, conditions]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        conditions:
          type: array
          items:
            $ref: "#/components/schemas/ConditionBlockCondition"
        tags:
          type: array
          items:
            type: string
        metadata:
          type: object
          additionalProperties: true
        updated_at:
          type: string
          format: date-time
        author:
          type: string
    ConditionBlockWrite:
      type: object
      required: [name, conditions]
      properties:
        name:
          type: string
        description:
          type: string
        conditions:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ConditionBlockCondition"
        tags:
          type: array
          items:
            type: string
        metadata:
          type: object
          additionalProperties: true
    ConditionBlockCondition:
      type: object
      required: [source, key, operator]
      properties:
        source:
          type: string
          enum: [attribute, segment, context, score]
        key:
          type: string
        operator:
          type: string
        value:
          nullable: true
        value_source:
          type: object
          additionalProperties: true
    SchemaItem:
      type: object
      required: [kind, name, type]
      properties:
        kind:
          type: string
          enum: [attribute, segment, context]
        name:
          type: string
        type:
