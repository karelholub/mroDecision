            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
  /v1/condition-blocks:
    get:
      summary: List reusable rule condition blocks
      responses:
        "200":
          description: Reusable condition blocks
          content:
            application/json:
              schema:
                type: object
                properties:
                  condition_blocks:
                    type: array
                    items:
                      $ref: "#/components/schemas/ConditionBlock"
  /v1/condition-blocks/{id}:
    put:
      summary: Create or update a reusable condition block
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConditionBlockWrite"
      responses:
        "200":
          description: Saved condition block
          content:
            application/json:
              schema:
                type: object
                properties:
                  condition_block:
                    $ref: "#/components/schemas/ConditionBlock"
    delete:
      summary: Delete a reusable condition block
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
