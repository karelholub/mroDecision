        by_variant:
          type: array
          items:
            $ref: "#/components/schemas/ClientEventGroup"
        by_message:
          type: array
          items:
            $ref: "#/components/schemas/ClientEventGroup"
        by_surface:
          type: array
          items:
            $ref: "#/components/schemas/ClientEventGroup"
        by_profile:
          type: array
          items:
            $ref: "#/components/schemas/ClientEventGroup"
        recent_events:
          type: array
          items:
            type: object
    ClientEventGroup:
      type: object
