name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Node checks and tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check JavaScript syntax
        run: npm run check

      - name: Run tests
        run: npm test

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t meiro-decision-engine:ci .
